name: process-embedded-protected-path-removal-terminates-root
document: |
  name: Toggle Embedded Doc
  child:
    count: 0
    contracts:
      childTimeline:
        type:
          blueId: Conversation/Timeline Channel
        timelineId: child
      incrementChild:
        type:
          blueId: Conversation/Sequential Workflow
        channel: childTimeline
        steps:
          - type:
              blueId: Conversation/Update Document
            changeset:
              - op: REPLACE
                path: /count
                val: "${document('count') + 1}"
  contracts:
    rootTimeline:
      type:
        blueId: Conversation/Timeline Channel
      timelineId: root
    embedded:
      type:
        blueId: Process Embedded
      paths:
        - /child
    removeEmbeddedPath:
      type:
        blueId: Conversation/Sequential Workflow
      channel: rootTimeline
      order: 1
      steps:
        - type:
            blueId: Conversation/Update Document
          changeset:
            - op: REMOVE
              path: /contracts/embedded/paths/0
    rootWriteAttempt:
      type:
        blueId: Conversation/Sequential Workflow
      channel: rootTimeline
      order: 2
      steps:
        - type:
            blueId: Conversation/Update Document
          changeset:
            - op: REPLACE
              path: /child/count
              val: "${document('/child/count') + 1}"
event: |
  type:
    blueId: Conversation/Timeline Entry
  eventId: fixture-protected-removal
  timeline:
    timelineId: root
  message:
    type:
      blueId: Conversation/Chat Message
    text: remove embedded path
expected:
  paths:
    /child/count: 0
    /contracts/terminated/cause: fatal
  triggeredEventsCount: 1
  triggeredPathValues:
    "0:/cause": fatal
  capabilityFailure: false
