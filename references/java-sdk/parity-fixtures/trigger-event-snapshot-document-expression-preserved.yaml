name: trigger-event-snapshot-document-expression-preserved
document: |
  name: Trigger Event Snapshot Document Expression Preserved Fixture
  counter: 0
  eventToTrigger:
    type:
      blueId: Conversation/Chat Message
    kind: start-session
    document:
      name: Child Session
      counter: 0
      contracts:
        increment:
          type:
            blueId: Conversation/Operation
          request:
            type: Integer
        incrementImpl:
          type:
            blueId: Conversation/Sequential Workflow Operation
          operation: increment
          steps:
            - type:
                blueId: Conversation/Update Document
              changeset:
                - op: REPLACE
                  path: /counter
                  val: "${document('counter') + event.request.value}"
  contracts:
    testChannel:
      type:
        blueId: TestEventChannel
    workflow:
      channel: testChannel
      type:
        blueId: Conversation/Sequential Workflow
      steps:
        - type:
            blueId: Conversation/Trigger Event
          event: "${document('/eventToTrigger')}"
event: |
  type:
    blueId: TestEvent
  eventId: fixture-trigger-snapshot
  kind: TestEvent
expected:
