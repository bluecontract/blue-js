name: trigger-event-init-nested-document-expression-preserved
document: |
  name: Trigger Event Init Nested Expression Preserved Doc
  contracts:
    life:
      type:
        blueId: Lifecycle Event Channel
    workflow:
      channel: life
      type:
        blueId: Conversation/Sequential Workflow
      event:
        type:
          blueId: Document Processing Initiated
      steps:
        - type:
            blueId: Conversation/Trigger Event
          event:
            type:
              blueId: Conversation/Chat Message
            message: start-session
            document:
              name: Child Session
              counter: 0
              contracts:
                increment:
                  type:
                    blueId: Conversation/Operation
                  request:
                    type: Integer
                incrementImpl:
                  type:
                    blueId: Conversation/Sequential Workflow Operation
                  operation: increment
                  steps:
                    - type:
                        blueId: Conversation/Update Document
                      changeset:
                        - op: REPLACE
                          path: /counter
                          val: "${document('counter') + event.request.value}"
expected:
  triggeredEventsCount: 2
  capabilityFailure: false
  triggeredPathValuesAny:
    /message: start-session
    /document/contracts/incrementImpl/steps/0/changeset/0/val: "${document('counter') + event.request.value}"
