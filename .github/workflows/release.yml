name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      version:
        description: Exact version to release, for example 4.0.2
        required: true
        type: string

env:
  # NX release needs to have a GH token in env.GITHUB_TOKEN
  # As during this workflow we will create a new release
  # that should trigger other workflow, we need to create custom TOKEN
  # with proper permissions,
  # more: https://docs.github.com/en/authentication/keeping-your-account-and-data-secure/managing-your-personal-access-tokens
  GITHUB_TOKEN: ${{ secrets.RELEASE_PAT }}

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ inputs.branch || github.ref }}
          token: ${{ secrets.RELEASE_PAT }}

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm install
        shell: bash

      - name: Print Environment Info
        run: npx nx report
        shell: bash

      - name: Configure Git
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
        shell: bash

      - name: Validate manual release version
        if: ${{ github.event_name == 'workflow_dispatch' }}
        env:
          RELEASE_VERSION: ${{ inputs.version }}
        run: |
          if [ "$GITHUB_REF" != "refs/heads/main" ]; then
            echo "Manual stable releases must run from main, got: $GITHUB_REF"
            exit 1
          fi

          if ! [[ "$RELEASE_VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Manual stable releases require an exact semver version, got: $RELEASE_VERSION"
            exit 1
          fi

          if git ls-remote --exit-code --tags origin "refs/tags/v$RELEASE_VERSION" >/dev/null; then
            echo "Tag v$RELEASE_VERSION already exists. Refusing to update an existing release."
            exit 1
          fi
        shell: bash

      - name: Release
        env:
          RELEASE_VERSION: ${{ inputs.version || '' }}
        run: |
          if [ -n "$RELEASE_VERSION" ]; then
            npx nx release "$RELEASE_VERSION" --skip-publish
          else
            npx nx release --skip-publish
          fi
        shell: bash
